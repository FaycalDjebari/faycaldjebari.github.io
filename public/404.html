<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fayçal Djebari</title>
    <script>
      // GitHub Pages SPA fallback: encode the requested path and redirect to
      // index.html, which decodes it and restores the route via pushState.
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 0; // served at the domain root
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?p=/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
