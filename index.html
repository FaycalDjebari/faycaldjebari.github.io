    <title>Home — Fayçal Djebari</title>
    <script>
      // GitHub Pages SPA fallback: decode the path encoded by 404.html and
      // restore it via pushState before React Router takes over.
      // https://github.com/rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>

  </body>
